<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customise Product | ANH Smart Venture</title>
  <link rel="stylesheet" href="style2.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <a href="index i.html" class="logo">
      <img src="images/logo.png" alt="ANH Smart Venture Logo">
    </a>

    <nav>
      <a href="index i.html">Home</a>
      <a href="products.html">Our Products</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Customise Section -->
  <section class="section">

    <h2>Customise Your Slipper</h2>
    <p class="subtitle">Choose base and strap colors</p>

    <div class="customise-container">

      <!-- Preview -->
      <div class="customise-image">
        <div class="slipper-preview">
          <img id="baseLayer" src="images/slipper-maroon.png">
          <img id="strapLayer" src="images/strap-beige.png">
        </div>
      </div>

      <!-- Options -->
      <div class="customise-options">

        <h3>Choose Base Color</h3>
        <div class="color-options">
          <img src="images/slipper-black.png" onclick="changeBase(this)">
          <img src="images/slipper-grey.png" onclick="changeBase(this)">
          <img src="images/slipper-maroon.png" onclick="changeBase(this)">
        </div>

        <h3>Choose Strap Color</h3>
        <div class="color-options">
          <img src="images/strap-beige2.png" onclick="changeStrap(this)">
          <img src="images/strap-black.png" onclick="changeStrap(this)">
          <img src="images/strap-brown.png" onclick="changeStrap(this)">
        </div>

        <h3>Quantity</h3>
        <input type="number" min="50" value="50">

        <button class="custom-btn">Submit Customisation</button>
         <form>
 <form>
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="size" placeholder="Size" required>

  <button type="button" onclick="sendWhatsApp()">Send via WhatsApp</button>
</form>
</section>
      </div>

    </div>

  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 ANH Smart Venture Sdn Bhd. All Rights Reserved.</p>
  </footer>

  <!-- JS -->
  <script>
    function changeBase(element) {
      document.getElementById("baseLayer").src = element.src;
    }

    function changeStrap(element) {
      document.getElementById("strapLayer").src = element.src;
    }
// WhatsApp function
  function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let size = document.getElementById("size").value;

    if (name === "" || size === "") {
      alert("Please fill in your details first!");
      return;
    }

    let phone = "60194128757";

    let text =
      "Hi! I'm interested in your slippers.%0A%0A" +
      "Name: " + name + "%0A" +
      "Size: " + size;

    window.open("https://wa.me/" + phone + "?text=" + text, "_blank");
  }
</script>
  </script>
  

</body>
</html>
