<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Comfort Slipper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <a href="index i.html" class="logo">
      <img src="images/logo.png" alt="ANH Smart Venture Logo">
    </a>

    <nav>
      <a href="index.html">Home</a>
      <a href="products.html">Our Products</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Product Section -->
  <section class="section">
    <a href="products.html" class="back-home-btn">← Back to Products</a>

    <h2>Premium Comfort Slipper</h2>

    <div class="product-detail">

      <!-- MAIN IMAGE -->
      <div class="main-image">
        <img src="images/layout-m.png" id="mainImg" alt="Premium Comfort Slipper">
      </div>

      <!-- INFO -->
      <div class="product-info">
        <p><strong>Material:</strong> Eco Rubber</p>
        <p><strong>Sizes:</strong> 37 – 46</p>
        <p><strong>Available Colors:</strong></p>

        <div class="pattern-gallery">
          <img src="images/m2.png" onclick="changeImage(this)" alt="Color 1">
          <img src="images/m3.png" onclick="changeImage(this)" alt="Color 2">
          <img src="images/m4.png" onclick="changeImage(this)" alt="Color 3">
        </div>

         <form>
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="size" placeholder="Size" required>

  <button type="button" onclick="sendWhatsApp()">Send via WhatsApp</button>
</form>
</section>
      </div>

    </div>
  </section>

  <!-- Script -->
   <script>
      function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let size = document.getElementById("size").value;

    if (name === "" || size === "") {
      alert("Please fill in your details first!");
      return;
    }

    let phone = "60194128757";

    let text =
      "Hi! I'm interested in your slippers.%0A%0A" +
      "Name: " + name + "%0A" +
      "Size: " + size;

    window.open("https://wa.me/" + phone + "?text=" + text, "_blank");
  }
</script>
</script>
  

</body>
</html>
