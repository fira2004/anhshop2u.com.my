<!DOCTYPE html>
<html>
<head>
  <title>Premium Comfort Slipper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="products.html">← Back to Products</a>
</nav>

<section class="section">
  <a href="index i.html" class="back-home-btn">← Back to Home</a>

  <h2>Premium Comfort Slipper</h2>

  <div class="product-detail">

    <!-- MAIN IMAGE -->
    <div class="main-image">
      <img src="images/layout basic.png" id="mainImg">
    </div>

    <!-- INFO -->
    <div class="product-info">
      <p><strong>Material:</strong> Eco Rubber</p>
      <p><strong>Sizes:</strong> 36 – 44</p>
      <p><strong>Available Colors:</strong></p>

      <div class="pattern-gallery">
        <img src="images/w2.png" onclick="changeImage(this)">
        <img src="images/w3.png" onclick="changeImage(this)">
        <img src="images/w4.png" onclick="changeImage(this)">
      </div>
      <form>
  <form>
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="size" placeholder="Size" required>

  <button type="button" onclick="sendWhatsApp()">Send via WhatsApp</button>
</form>
</section>
    </div>

  </div>

</section>

<script>
  function changeImage(img) {
    document.getElementById("mainImg").src = img.src;
  }
</script>
<script>
  function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let size = document.getElementById("size").value;

    if (name === "" || size === "") {
      alert("Please fill in your details first!");
      return;
    }

    let phone = "60194128757";

    let text =
      "Hi! I'm interested in your slippers.%0A%0A" +
      "Name: " + name + "%0A" +
      "Size: " + size;

    window.open("https://wa.me/" + phone + "?text=" + text, "_blank");
  }
</script>
</body>
</html>
